services:
  db:
    image: postgres:15
    container_name: tabletop_db
    environment:
      POSTGRES_DB: ${DB_NAME:-TabletopStoreUP}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      # 5432 на хосте часто занят локальным PostgreSQL — снаружи контейнер слушает 5433
      - "5433:5432"

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: tabletop_web
    environment:
      # Django
      DEBUG: ${DEBUG:-1}
      SECRET_KEY: ${SECRET_KEY:-change-me}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}

      # DB (Django settings читает из env)
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME:-TabletopStoreUP}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: db
      DB_PORT: 5432

      # Email (если используешь)
      EMAIL_HOST: ${EMAIL_HOST:-smtp.gmail.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}

      # Прочее
      SEED_DEMO: ${SEED_DEMO:-1}
      BACKUPS_DIR: /app/backups
      MEDIA_ROOT: /app/media
      STATIC_ROOT: /app/staticfiles

    volumes:
      - ./media:/app/media
      - ./backups:/app/backups
      - ./staticfiles:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  pgdata:
